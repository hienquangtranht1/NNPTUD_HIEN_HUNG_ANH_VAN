<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Task Management - Chat Demo</title>
<style>body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px}
#messages{border:1px solid #ccc;height:300px;overflow-y:auto;padding:10px;border-radius:6px;background:#f9f9f9;margin-bottom:10px}
.msg{margin:5px 0;padding:8px 12px;background:#fff;border-radius:4px;border-left:4px solid #3498db}
input{width:75%;padding:10px;border:1px solid #ccc;border-radius:4px}
button{padding:10px 16px;background:#3498db;color:#fff;border:none;border-radius:4px;cursor:pointer}</style></head>
<body>
<h2>💬 Task Chat (resources/chat.html)</h2>
<div id="messages"><div class="msg">Chào mừng đến với Task Chat!</div></div>
<input id="inp" type="text" placeholder="Nhập tin nhắn..." />
<button onclick="send()">Gửi</button>
<script>
function send(){
  let inp=document.getElementById('inp');
  let box=document.getElementById('messages');
  if(inp.value.trim()){
    box.innerHTML+=`<div class="msg"><strong>Bạn:</strong> ${inp.value}</div>`;
    inp.value=''; box.scrollTop=box.scrollHeight;
  }
}
document.getElementById('inp').onkeypress=e=>{if(e.key==='Enter')send();};
</script>
</body></html>
